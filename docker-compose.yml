services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fcl
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fcl
      REDIS_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:8011:8000"
    depends_on:
      - postgres
      - redis

  bot:
    build:
      context: ./bot
    env_file:
      - ./bot/.env
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:5006:80"
    depends_on:
      - backend

  landing:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./fcl_lend:/app
    ports:
      - "5174:5173"
    profiles:
      - landing

volumes:
  pg_data:

